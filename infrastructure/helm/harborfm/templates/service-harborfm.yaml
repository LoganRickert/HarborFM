apiVersion: v1
kind: Service
metadata:
  name: {{ include "harborfm.fullname" . }}
  labels:
    {{- include "harborfm.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "harborfm.selectorLabels" (merge (dict "component" "app") .) | nindent 4 }}
