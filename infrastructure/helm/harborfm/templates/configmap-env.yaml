apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "harborfm.fullname" . }}-env
  labels:
    {{- include "harborfm.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "3001"
  DATA_DIR: "/data"
  SECRETS_DIR: "/secrets"
  WEBRTC_RECORDINGS_DIR: "/webrtc"
  ADMIN_PASSWORD_HASH_FILE: "/secrets/admin_password_hash"
  DOMAIN: {{ .Values.domain | quote }}
  COOKIE_SECURE: {{ .Values.cookieSecure | quote }}
  ALLOW_VIDEO_GENERATION: {{ .Values.allowVideoGeneration | quote }}
  ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  ADMIN_REGISTRATION_ENABLED: {{ .Values.admin.registrationEnabled | quote }}
  ADMIN_PUBLIC_FEEDS_ENABLED: {{ .Values.admin.publicFeedsEnabled | quote }}
  ADMIN_HOSTNAME: {{ .Values.admin.hostname | quote }}
  WEBRTC_ENABLED: {{ ternary "1" "0" .Values.webrtc.enabled | quote }}
  WEBRTC_SERVICE_URL: {{ ternary (printf "http://%s-webrtc:3002" (include "harborfm.fullname" .)) "" .Values.webrtc.enabled | quote }}
  WEBRTC_PUBLIC_WS_URL: {{ .Values.webrtc.publicWsUrl | quote }}
  CADDY_TLS_CHECK_SECRET: {{ .Values.caddyTlsCheckSecret | quote }}
